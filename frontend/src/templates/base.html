<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}KadPilot{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">

    {% block styles %}{% endblock %}
</head>

<body>

<header class="site-header">

    <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">KadPilot</span>
    </a>

    <nav class="site-nav">
        <a href="/chatbot">Ask KadPilot</a>
        <a href="/dashboard">Browse Cards</a>
    </nav>

</header>

<main>

    {% block content %}

    {% endblock %}

</main>

<footer class="site-footer">
    <p>&copy; 2026 KadPilot &middot; Card data collected manually, may not reflect current bank terms.</p>
</footer>

{% block scripts %}

{% endblock %}

</body>

</html>
