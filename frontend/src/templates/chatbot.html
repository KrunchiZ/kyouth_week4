{% extends "base.html" %}

{% block title %}
AI Chatbot
{% endblock %}

{% block styles %}

<link rel="stylesheet" href="/static/css/chatbot.css">

{% endblock %}

{% block content %}

<h1>Ask Our AI</h1>

<div class="chat-box">

    <textarea id="question" placeholder="Ask something..."></textarea>

    <div class="chat-controls">

        <div class="control-group">
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
                <optgroup label="Gemini">
                    <option value="gemini-3.1-flash-lite" selected>Gemini 3.1 Flash Lite</option>
                    <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                    <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
                </optgroup>
                <optgroup label="Ollama (Local)">
                    <option value="llama3.2">Llama 3.2</option>
                    <option value="gemma3:1b">Gemma 3 1B</option>
                </optgroup>
            </select>
        </div>

        <div class="control-group">
            <label for="topK">Cards used (top_k)</label>
            <select id="topK">
                <option value="1">1</option>
                <option value="3" selected>3</option>
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="17">17</option>
            </select>
        </div>

    <button id="askBtn"> Ask </button>

</div>

<div id="loading"></div>

<div id="answer"></div>

<div id="card-result"></div>

{% endblock %}

{% block scripts %}

<script src="/static/js/chatbot.js"></script>

{% endblock %}
