{% extends "base.html" %}

{% block title %}
AI Chatbot
{% endblock %}

{% block styles %}

<link rel="stylesheet" href="/static/css/chatbot.css">

{% endblock %}

{% block content %}

<h1>Ask Our AI</h1>

<div class="chat-box">

    <textarea
        id="question"
        placeholder="Ask something..."
    ></textarea>

    <button id="askBtn">

        Ask

    </button>

</div>

<div id="loading"></div>

<div id="answer"></div>

{% endblock %}

{% block scripts %}

<script src="/static/js/chatbot.js"></script>

{% endblock %}
